<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>low-poly worlds</title>
  <meta name="description" content="A small atlas of low-poly living postcards." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="loader" aria-hidden="true">
    <div class="loader-inner">
      <div class="loader-mon">🗺️</div>
      <h1 class="loader-name">low-poly worlds</h1>
      <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
      <p class="loader-msg" id="loader-msg">unrolling the map…</p>
    </div>
  </div>

  <!-- full-bleed 3D atlas: "Cartoon world map" by Ashkod (Sketchfab, CC-BY
       4.0) — a map-table diorama with its own painted sea. The camera's
       cover-framing crops to fill the viewport edge to edge instead of
       letterboxing. Pins are DOM elements projected from world space by
       main.js. -->
  <canvas id="scene" aria-hidden="true"></canvas>

  <div class="marker marker-musashi" data-href="musashi-homepage/" data-label="musashi's hill ↗" tabindex="0" role="link" aria-label="musashi's hill">
    <span class="marker-ring"></span><span class="marker-dot"></span>
  </div>
  <div class="marker marker-sparrows" data-href="sparrows-wake/" data-label="sparrow's wake ↗" tabindex="0" role="link" aria-label="sparrow's wake">
    <span class="marker-ring"></span><span class="marker-dot"></span>
  </div>

  <header class="wordmark">
    <span class="wordmark-en">low-poly worlds</span>
    <span class="wordmark-sub">a small atlas</span>
  </header>

  <p class="hint">click a marker to visit</p>
  <a class="map-credit" href="https://sketchfab.com/3d-models/cartoon-world-map-8ad781e3183643899a31f228c00ff744" target="_blank" rel="noopener">map © ashkod, cc-by</a>
  <a class="off-world-link" href="off-world.html">off-world ↗</a>
  <div id="marker-label"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
